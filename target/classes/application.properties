spring.application.name=portal
server.port=8080
server.address=0.0.0.0
# SQL Server Configuration
# Note: Update these with your actual SQL Server credentials
spring.datasource.url=jdbc:sqlserver://localhost;instanceName=SQLEXPRESS;databaseName=CampusRecruitment;integratedSecurity=true;encrypt=true;trustServerCertificate=true;
# Username and password are not needed for Windows Authentication
# spring.datasource.username=sa
# spring.datasource.password=YourStrong!Passw0rd
spring.datasource.driverClassName=com.microsoft.sqlserver.jdbc.SQLServerDriver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect

# File Upload
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
file.upload-dir=uploads

# Gemini AI Settings (Update with your actual API key)
gemini.api.key=YOUR_GEMINI_API_KEY
gemini.api.url=https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent

# Mail Configuration (Gmail App Password)
